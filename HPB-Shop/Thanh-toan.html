<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hoàn tất đơn hàng - HPB Sports</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/checkout.css">
    
</head>
<body class="bg-light">

    <header class="py-3 bg-white border-bottom sticky-top">
        <div class="container d-flex justify-content-between align-items-center">
            <a href="Trang-chu.html" class="navbar-brand fw-bold fs-3 text-primary">HPB</a>
            <div class="d-flex gap-4 small fw-bold">
                <a href="Trang-chu.html" class="text-secondary text-decoration-none">Tiếp tục mua sắm</a>
                <a href="Gio-hang.html" class="text-secondary text-decoration-none">Trở về giỏ hàng</a>
            </div>
        </div>
    </header>

    <main class="py-5">
        <div class="container" style="max-width: 1000px;">
            <h2 class="text-center text-primary fw-bold mb-5">Hoàn tất đơn hàng</h2>

            <div class="row g-4">
                <div class="col-lg-7">
                    <div class="card border-0 shadow-sm rounded-4 p-4">
                        <h5 class="fw-bold mb-4">Giỏ hàng của bạn</h5>
                        
                        <div class="checkout-list" id="checkout-items">
                            <div class="text-secondary small">Đang tải dữ liệu giỏ hàng...</div>
                        </div>
                    </div>
                </div>

                <div class="col-lg-5">
                    <div class="card border-0 shadow-sm rounded-4 p-4 mb-4">
                        <h5 class="fw-bold mb-4">Thông tin nhận hàng</h5>
                        <div class="mb-3">
                            <label for="checkout-province" class="form-label small fw-bold">Tỉnh / Thành phố</label>
                            <select id="checkout-province" class="form-select">
                                <option value="">Chọn Tỉnh / Thành phố</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="checkout-ward" class="form-label small fw-bold">Xã / Phường / Đặc khu</label>
                            <select id="checkout-ward" class="form-select" disabled>
                                <option value="">Chọn Xã / Phường / Đặc khu</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="checkout-address" class="form-label small fw-bold">Số nhà, tên đường</label>
                            <input id="checkout-address" class="form-control" placeholder="Ví dụ: 123 Lê Lợi">
                        </div>
                        <div class="mb-0">
                            <label for="checkout-phone" class="form-label small fw-bold">Số điện thoại</label>
                            <input id="checkout-phone" class="form-control" placeholder="Nhập số điện thoại">
                        </div>
                    </div>

                    <div class="card border-0 shadow-sm rounded-4 p-4 mb-4">
                        <h5 class="fw-bold mb-4">Phương thức thanh toán</h5>
                        <div class="form-check mb-3 p-3 border rounded">
                            <input class="form-check-input ms-0 me-3" type="radio" name="pay" id="bank" value="Bank Transfer" checked>
                            <label class="form-check-label small fw-bold" for="bank">Chuyển khoản ngân hàng</label>
                        </div>
                        <div class="form-check p-3 border rounded">
                            <input class="form-check-input ms-0 me-3" type="radio" name="pay" id="cod" value="COD">
                            <label class="form-check-label small fw-bold" for="cod">Thanh toán khi nhận hàng (COD)</label>
                        </div>
                    </div>

                    <div class="card border-0 shadow-sm rounded-4 p-4">
                        <h5 class="fw-bold mb-4">Tổng hợp thanh toán</h5>
                        <div class="d-flex justify-content-between mb-2 small text-secondary">
                            <span>Tạm tính</span>
                            <span class="fw-bold text-dark" id="checkout-subtotal">0 ₫</span>
                        </div>
                        <div class="d-flex justify-content-between mb-4 small text-secondary border-bottom pb-3">
                            <span>Phí vận chuyển</span>
                            <span class="fw-bold text-dark" id="checkout-shipping">50.000 ₫</span>
                        </div>
                        <div class="d-flex justify-content-between mb-4">
                            <span class="fw-bold text-primary">Tổng cộng</span>
                            <span class="fw-bold text-primary fs-5" id="checkout-total">0 ₫</span>
                        </div>
                        <button id="checkout-submit" class="btn btn-primary w-100 py-3 fw-bold">Xác nhận và Thanh toán</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="py-4 text-center text-secondary x-small">
        © 2026 HPB Sports. All rights reserved.
    </footer>

    <script src="JS/checkout.js"></script>

</body>
</html>
